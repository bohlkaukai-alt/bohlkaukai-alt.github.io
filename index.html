    <script>
        (function () {
            try {
                var theme = localStorage.getItem('app_theme') || 'light';
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
            try {
                var ua = navigator.userAgent || '';
                var width = Math.min(window.innerWidth || screen.width || 0, screen.width || window.innerWidth || 0);
                var isIPad = /iPad/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
                var isTabletUA = /Tablet|Android(?!.*Mobile)|Silk|Kindle|PlayBook/.test(ua);
                var isMobileUA = /Mobi|Android|iPhone|iPod|Windows Phone/.test(ua) && !isIPad && !isTabletUA;
                var device = 'desktop';
                if (isMobileUA || width <= 640) device = 'mobile';
                else if (isIPad || isTabletUA || width <= 1024) device = 'tablet';
                document.documentElement.setAttribute('data-device', device);
                document.documentElement.setAttribute('data-orientation', window.innerWidth > window.innerHeight ? 'landscape' : 'portrait');
            } catch (e) {
                document.documentElement.setAttribute('data-device', 'desktop');
            }
        })();
    </script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-theme="light" data-device="desktop" data-orientation="landscape">
<script>
    (function () {
        try {
            var theme = localStorage.getItem('app_theme') || 'light';
            var device = document.documentElement.getAttribute('data-device') || 'desktop';
            var orientation = document.documentElement.getAttribute('data-orientation') || 'landscape';
            document.body.setAttribute('data-theme', theme);
            document.body.setAttribute('data-device', device);
            document.body.setAttribute('data-orientation', orientation);
        } catch (e) {}
    })();
</script>
